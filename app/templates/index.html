<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">

    <title>Прогноз оттока клиентов банка</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<style>

body{
    background-image: url("https://images.unsplash.com/photo-1554224155-6726b3ff858f");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.card{
    background: rgba(255,255,255,0.92);
    border-radius: 20px;
}

</style>

<body class="bg-light">

<div class="d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 30rem;">

        <div class="card-body">

            <h2 class="text-center mb-4">
                Прогноз оттока клиента банка
            </h2>

            <form action="/predict" method="POST">

                <label class="form-label">
                    Кредитный рейтинг клиента
                </label>

                <input type="number"
                       class="form-control mb-3"
                       name="credit_score"
                       min="350"
                       max="850"
                       step="1"
                       style="text-align: center;"
                       required>

                <label class="form-label">
                    Страна
                </label>

                <select class="form-select mb-3" name="geography">
                    <option value="France">Франция</option>
                    <option value="Germany">Германия</option>
                    <option value="Spain">Испания</option>
                </select>

                <label class="form-label">
                    Пол
                </label>

                <select class="form-select mb-3" name="gender">
                    <option value="Male">Мужчина</option>
                    <option value="Female">Женщина</option>
                </select>

                <label class="form-label">
                    Возраст
                </label>

                <input type="number"
                       class="form-control mb-3"
                       name="age"
                       min="18"
                       max="100"
                       step="1"
                       style="text-align: center;"
                       required>

                <label class="form-label">
                    Стаж клиента в банке
                </label>

                <input type="number"
                       class="form-control mb-3"
                       name="tenure"
                       min="1"
                       max="50"
                       step="any"
                       style="text-align: center;"
                       required>

                <label class="form-label">
                    Баланс
                </label>

                <input type="number"
                       class="form-control mb-3"
                       name="balance"
                       step="any"
                       style="text-align: center;"
                       required>

                <label class="form-label">
                    Количество продуктов
                </label>

                <input type="number"
                       class="form-control mb-3"
                       name="num_products"
                       min="1"
                       max="10"
                       step="1"
                       style="text-align: center;"
                       required>

                <label class="form-label">
                    Есть кредитная карта?
                </label>

                <select class="form-select mb-3" name="has_card">
                    <option value="1">Да</option>
                    <option value="0">Нет</option>
                </select>

                <label class="form-label">
                    Активный клиент?
                </label>

                <select class="form-select mb-3" name="active_member">
                    <option value="1">Да</option>
                    <option value="0">Нет</option>
                </select>

                <label class="form-label">
                    Зарплата клиента
                </label>

                <input type="number"
                       class="form-control mb-4"
                       name="salary"
                       step="any"
                       style="text-align: center;"
                       required>

                <button type="submit"
                        class="btn btn-success w-100">
                    Предсказать
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
