<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Прогноз оттока клиентов банка</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
    <style>

body{
    background-image: url("https://images.unsplash.com/photo-1554224155-6726b3ff858f");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    margin: 0;
    padding: 25px;

    font-family: 'Segoe UI', sans-serif;
}

.container-box{
    width: 100%;
    max-width: 430px;
}

.card{
    background: white;

    border-radius: 22px;

    border: none;

    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
}

.card-body{
    padding: 22px;
}

h2{
    text-align: center;

    font-size: 24px;

    font-weight: 700;

    color: #111;

    margin-bottom: 18px;
}

.form-label{
    font-size: 13px;

    font-weight: 600;

    color: #222;

    margin-bottom: 5px;
}

.form-control,
.form-select{

    height: 42px;

    border-radius: 10px;

    border: 1px solid rgba(0,0,0,0.12);

    font-size: 14px;

    padding: 6px 12px;

    background: white;

    transition: 0.2s;
}

.form-control:focus,
.form-select:focus{

    border-color: #198754;

    box-shadow:
        0 0 0 0.15rem rgba(25,135,84,0.15);
}

.btn-success{

    height: 44px;

    border-radius: 10px;

    font-size: 14px;

    font-weight: 600;

    transition: 0.2s;
}

.btn-success:hover{
    transform: translateY(-1px);
}

.mb-3{
    margin-bottom: 10px !important;
}

.mb-4{
    margin-bottom: 14px !important;
}

@media (max-width: 300px){

    body{
        padding: 10px;
    }

    .container-box{
        max-width: 100%;
    }

    .card-body{
        padding: 18px;
    }

    h2{
        font-size: 22px;
    }
}

html{
    zoom: 78%;
}

.container-box{
    max-width: 390px !important;
}

.card-body{
    padding: 18px !important;
}

h2{
    font-size: 24px !important;
    margin-bottom: 16px !important;
}

.form-control,
.form-select{
    height: 36px !important;
    font-size: 13px !important;
    padding: 5px 10px !important;
}

.form-label{
    font-size: 13px !important;
    margin-bottom: 4px !important;
}

.mb-3{
    margin-bottom: 9px !important;
}

.mb-4{
    margin-bottom: 12px !important;
}

.btn-success{
    height: 38px !important;
    font-size: 13px !important;
}

</style>
</style>

<body>
<div class="container-box">
    <div class="card p-2 shadow">

        <div class="card-body">

            <h2 class="text-center mb-4">
                Прогноз оттока клиента банка
            </h2>

            <form action="/predict" method="POST">

                <label class="form-label">
                    Кредитный рейтинг клиента от 350 до 850
                </label>

                <input type="number"
                       class="form-control mb-3"
                       name="credit_score"
                       min="350"
                       max="850"
                       step="1"
                       style="text-align: center;"
                       required>

                <label class="form-label">
                    Страна
                </label>

                <select class="form-select mb-3" name="geography">
                    <option value="France">Франция</option>
                    <option value="Germany">Германия</option>
                    <option value="Spain">Испания</option>
                </select>

                <label class="form-label">
                    Пол
                </label>

                <select class="form-select mb-3" name="gender">
                    <option value="Male">Мужчина</option>
                    <option value="Female">Женщина</option>
                </select>

                <label class="form-label">
                    Возраст
                </label>

                <input type="number"
                       class="form-control mb-3"
                       name="age"
                       min="18"
                       max="100"
                       step="1"
                       style="text-align: center;"
                       required>

                <label class="form-label">
                    Стаж клиента в банке
                </label>

                <input type="number"
                       class="form-control mb-3"
                       name="tenure"
                       min="1"
                       max="50"
                       step="any"
                       style="text-align: center;"
                       required>

                <label class="form-label">
                    Баланс
                </label>

                <input type="number"
                       class="form-control mb-3"
                       name="balance"
                       step="any"
                       style="text-align: center;"
                       required>

                <label class="form-label">
                    Количество продуктов
                </label>

                <input type="number"
                       class="form-control mb-3"
                       name="num_products"
                       min="1"
                       max="10"
                       step="1"
                       style="text-align: center;"
                       required>

                <label class="form-label">
                    Есть кредитная карта?
                </label>

                <select class="form-select mb-3" name="has_card">
                    <option value="1">Да</option>
                    <option value="0">Нет</option>
                </select>

                <label class="form-label">
                    Активный клиент?
                </label>

                <select class="form-select mb-3" name="active_member">
                    <option value="1">Да</option>
                    <option value="0">Нет</option>
                </select>

                <label class="form-label">
                    Зарплата клиента
                </label>

                <input type="number"
                       class="form-control mb-4"
                       name="salary"
                       step="any"
                       style="text-align: center;"
                       required>

                <button type="submit"
                        class="btn btn-success w-100">
                    Предсказать
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
