<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">

    <title>Результат прогнозирования</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background-image: url("https://images.unsplash.com/photo-1554224155-6726b3ff858f");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .result-card{
            background: rgba(255,255,255,0.93);
            border-radius: 20px;
            padding: 40px;
            width: 500px;
            text-align: center;
        }

        .title{
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .result-text{
            font-size: 28px;
            font-weight: bold;
        }

        .probability{
            font-size: 24px;
            margin-top: 20px;
        }

    </style>

</head>

<body>

<div class="d-flex justify-content-center align-items-center vh-100">

    <div class="result-card shadow">

        <div class="title">
            📊 Результат прогнозирования
        </div>

        {% if prediction == 1 %}

            <div class="result-text text-danger">
                ❌ Клиент уйдёт из банка
            </div>

        {% else %}

            <div class="result-text text-success">
                ✅ Клиент останется в банке
            </div>

        {% endif %}

        <div class="probability">
            Вероятность ухода:
            <b>{{ probability }}%</b>
        </div>

        <a href="/"
           class="btn btn-primary mt-4 w-100">
            ← Назад
        </a>

    </div>

</div>

</body>
</html>
